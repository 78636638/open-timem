# TiMem Full Stack Docker Compose Configuration
#
# Complete services for TiMem deployment:
#   ✅ PostgreSQL - Primary database
#   ✅ Qdrant - Vector database
#   ✅ Redis - Cache
#   ✅ TiMem API - FastAPI service
#

networks:
  timem_network:
    driver: bridge

services:
  postgres:
    container_name: timem_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-timem_db}
      POSTGRES_USER: ${POSTGRES_USER:-timem_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-timem_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    healthcheck:
      interval: 30s
      retries: 3
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-timem_user} -d ${POSTGRES_DATABASE:-timem_db}
      timeout: 10s
    image: postgres:15-alpine
    networks:
    - timem_network
    ports:
    - "15432:5432"
    restart: unless-stopped
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro

  qdrant:
    container_name: timem_qdrant
    environment:
    - QDRANT__SERVICE__HTTP_PORT=6333
    - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 40s
      test:
      - CMD-SHELL
      - test -f /qdrant/.qdrant-initialized || exit 1
      timeout: 10s
    image: qdrant/qdrant:latest
    networks:
    - timem_network
    ports:
    - "16333:6333"
    - "16334:6334"
    restart: unless-stopped
    volumes:
    - qdrant_data:/qdrant/storage
    - ./docker/qdrant/config.yaml:/qdrant/config/config.yaml:ro

  redis:
    container_name: timem_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      interval: 30s
      retries: 3
      test:
      - CMD-SHELL
      - redis-cli ping
      timeout: 10s
    image: redis:7-alpine
    networks:
    - timem_network
    ports:
    - "16379:6379"
    restart: unless-stopped
    volumes:
    - redis_data:/data

  api:
    container_name: timem_api
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-timem_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-timem_password}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-timem_db}
      QDRANT_URL: http://qdrant:6333
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      ${LLM_PROVIDER}_API_KEY: ${LLM_API_KEY:-}
    healthcheck:
      interval: 30s
      retries: 3
      test:
      - CMD-SHELL
      - python -c "import requests; requests.get('http://localhost:8000/api/v1/health/live')"
      timeout: 10s
    networks:
    - timem_network
    ports:
    - "8000:8000"
    restart: unless-stopped
    volumes:
    - ./config:/app/config:ro
    - ./.env:/app/.env:ro

volumes:
  postgres_data:
  qdrant_data:
  redis_data: